# HTTP -> redirect to HTTPS (optional; Cloudflare can handle)
server {
    listen 80;
    server_name easynodeone.com www.easynodeone.com;
    root /var/www/easynodeone;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /logos/ {
        alias /var/www/easynodeone/logos/;
    }
    location /assets/ {
        alias /var/www/easynodeone/assets/;
    }
}

# HTTPS with Cloudflare Origin Certificate (Full Strict)
# Create cert in Cloudflare: SSL/TLS -> Origin Server -> Create Certificate
# Save cert as /etc/nginx/ssl/easynodeone/origin.pem and key as origin-key.pem
server {
    listen 443 ssl;
    server_name easynodeone.com www.easynodeone.com;
    ssl_certificate     /etc/nginx/ssl/easynodeone/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/easynodeone/origin-key.pem;
    root /var/www/easynodeone;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /logos/ {
        alias /var/www/easynodeone/logos/;
    }
    location /assets/ {
        alias /var/www/easynodeone/assets/;
    }
}
