# =============================================================================
# Moodle — cursos.easynodeone.com (PHP-FPM, document root moderno)
# =============================================================================
# DNS: A «cursos» → IP del servidor Moodle (ej. 86.48.20.243). NodeOne vive en 136.112.128.239.
# Desplegar SOLO en el servidor Moodle.
# server_name: cursos.easynodeone.com
# Código Moodle: /var/www/moodle. Moodle 4.x STABLE: document root = dirroot (no subcarpeta public/).
# No instala Moodle; solo Nginx. Ajustá MOODLE_ROOT si tu ruta difiere.
#
# Despliegue:
#   sudo bash scripts/deploy-nginx-moodle-cursos.sh
#
# Certificado: mismo Origin *.easynodeone.com que Easy NodeOne (Full strict en CF).
# =============================================================================
map $http_x_forwarded_proto $moodle_forwarded_proto { default $http_x_forwarded_proto; '' $scheme; }

server {
    listen 80;
    server_name cursos.easynodeone.com;
    root /var/www/moodle;
    index index.php;
    client_max_body_size 256M;
    access_log /var/log/nginx/moodle-cursos.access.log;
    error_log  /var/log/nginx/moodle-cursos.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_X_FORWARDED_PROTO $moodle_forwarded_proto;
        fastcgi_read_timeout 300;
    }

    location ~* /\. {
        deny all;
    }
}

server {
    listen 443 ssl;
    server_name cursos.easynodeone.com;
    root /var/www/moodle;
    index index.php;
    ssl_certificate     /etc/nginx/ssl/easynodeone/app-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/easynodeone/app-origin-key.pem;
    client_max_body_size 256M;
    access_log /var/log/nginx/moodle-cursos.access.log;
    error_log  /var/log/nginx/moodle-cursos.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO $moodle_forwarded_proto;
        fastcgi_read_timeout 300;
    }

    location ~* /\. {
        deny all;
    }
}
