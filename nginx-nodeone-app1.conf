# =============================================================================
# Easy NodeOne — app1.easynodeone.com → Gunicorn 127.0.0.1:8000
# =============================================================================
# DNS: A «app1» → 86.48.20.243 (este servidor). Proxy Cloudflare OK.
# Requiere: nodeone.service activo y mismo .env que en producción (DB, SECRET_KEY).
# Tenant: EASYNODEONE_APPS_ORG_SUBDOMAIN en .env (mismo slug que apps si aplica).
#
#   sudo bash scripts/deploy-nginx-nodeone-app1.sh
#
# TLS: mismo par que Moodle (Origin CF *.easynodeone.com o PEM en rutas de abajo).
# =============================================================================
map $http_x_forwarded_proto $forwarded_proto { default $http_x_forwarded_proto; '' $scheme; }
map $http_x_forwarded_port $forwarded_port { default $http_x_forwarded_port; '' $server_port; }

server {
    listen 80;
    server_name app1.easynodeone.com;
    access_log /var/log/nginx/nodeone-app1.access.log;
    error_log /var/log/nginx/nodeone-app1.error.log;
    client_max_body_size 50M;
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml;
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    error_page 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

server {
    listen 443 ssl;
    server_name app1.easynodeone.com;
    ssl_certificate     /etc/nginx/ssl/easynodeone/app-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/easynodeone/app-origin-key.pem;
    access_log /var/log/nginx/nodeone-app1.access.log;
    error_log /var/log/nginx/nodeone-app1.error.log;
    client_max_body_size 50M;
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml;
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    error_page 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
