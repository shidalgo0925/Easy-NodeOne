# =============================================================================
# Easy NodeOne — Nginx (Flask 127.0.0.1:9001)
# =============================================================================
# DESPLIEGUE en el servidor:
#   sudo bash scripts/deploy-nginx-nodeone.sh
#   (instala en sites-available/app.easynodeone.com por defecto; backup, nginx -t y reload).
#   Los "map" + "server" deben cargarse dentro de http { } — en Debian/Ubuntu
#   sites-enabled suele estar incluido desde http, así que este archivo entero vale.
#
# DNS (Cloudflare u otro):
#   - app.easynodeone.com → origen (A o CNAME)
#   - *.easynodeone.com   → mismo origen (wildcard), obligatorio para tenants
#
# CERTIFICADOS TLS en el origen (443):
#   - Opción A (recomendada con Cloudflare): Origin Certificate en el panel
#     SSL/TLS → Origin Server → Create. Incluir en el CSR/hostnames:
#       app.easynodeone.com, *.easynodeone.com, easynodeone.com
#     Guardar .pem y .key en las rutas ssl_certificate* de abajo.
#   - Cloudflare modo "Full (strict)": el cert del origen DEBE ser el de CF o
#     uno público válido para esos nombres; "Full" sin strict acepta autofirmado.
#   - Si el .pem actual solo cubre "app", los subdominios en 443 fallarán o
#     darán ERR_CERT_COMMON_NAME_INVALID hasta renovar con SAN/wildcard.
#
# No afecta miembresia-relatic (puerto 9000) si usa otro server_name.
# =============================================================================
# Pasar proto/puerto que envía Cloudflare para que Flask vea HTTPS bien
map $http_x_forwarded_proto $forwarded_proto { default $http_x_forwarded_proto; '' $scheme; }
map $http_x_forwarded_port $forwarded_port { default $http_x_forwarded_port; '' $server_port; }

server {
    listen 80;
    server_name app.easynodeone.com;
    access_log /var/log/nginx/nodeone.access.log;
    error_log /var/log/nginx/nodeone.error.log;
    client_max_body_size 50M;
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml;
    location /static/ {
        alias /home/relaticpanama2025/workspace/NodeOne/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location / {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
proxy_set_header X-Forwarded-Port $forwarded_port;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    error_page 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

# HTTP — tenants (*.easynodeone.com). Misma app: Flask usa Host para resolver org.
# Nginx elige este bloque para barbershop.easynodeone.com; "app" usa el server_name exacto arriba.
