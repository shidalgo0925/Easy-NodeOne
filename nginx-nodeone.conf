# Nginx: backend Easy NodeOne (Flask puerto 9001)
# No afecta a miembros.relatic.org (membresia-relatic en puerto 9000).
# Pasar proto/port que envía Cloudflare para que Flask vea HTTPS correctamente
map $http_x_forwarded_proto $forwarded_proto { default $http_x_forwarded_proto; '' $scheme; }
map $http_x_forwarded_port $forwarded_port { default $http_x_forwarded_port; '' $server_port; }

server {
    listen 80;
    server_name app.easynodeone.com;
    access_log /var/log/nginx/nodeone.access.log;
    error_log /var/log/nginx/nodeone.error.log;
    client_max_body_size 50M;
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml;
    location /static/ {
        alias /home/relaticpanama2025/workspace/NodeOne/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location / {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
proxy_set_header X-Forwarded-Port $forwarded_port;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    error_page 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

