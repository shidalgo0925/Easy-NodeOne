# HTTPS (cert autofirmado; Cloudflare en "Full" lo acepta; "Full strict" requiere Origin Cert desde panel)
server {
    listen 443 ssl;
    server_name app.easynodeone.com;
    ssl_certificate     /etc/nginx/ssl/easynodeone/app-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/easynodeone/app-origin-key.pem;
    access_log /var/log/nginx/nodeone.access.log;
    error_log /var/log/nginx/nodeone.error.log;
    client_max_body_size 50M;
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml;
    location /static/ {
        alias /home/relaticpanama2025/workspace/NodeOne/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location / {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
