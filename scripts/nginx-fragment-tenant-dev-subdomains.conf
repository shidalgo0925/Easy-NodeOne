# Subdominios *dev.easynodeone.com → upstream easynodeone_dev_app (9101).
# Insertar en easynodeone-prd-dev-app.conf tras el bloque HTTPS de appdev.
# Convención expos/tenant: {nombre}dev.easynodeone.com (ej. tonydev).
# TLS: añadir cada host al certificado compartido, p. ej.:
#   sudo certbot certonly --webroot -w /var/www/certbot \
#     --cert-name appprd.easynodeone.com --expand \
#     -d appprd.easynodeone.com -d appdev.easynodeone.com -d foodev.easynodeone.com
# Alternativa: certificado wildcard *.easynodeone.com (validación DNS).

# --- DEV: *dev.easynodeone.com → 9101 ---
server {
    listen 80;
    listen [::]:80;
    server_name ~^[a-z0-9-]+dev\.easynodeone\.com$;

    client_max_body_size 64M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://easynodeone_dev_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_redirect off;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ~^[a-z0-9-]+dev\.easynodeone\.com$;

    include /etc/nginx/snippets/ssl-easynodeone-prd-dev.conf;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 64M;

    location / {
        proxy_pass http://easynodeone_dev_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_redirect off;
    }
}
