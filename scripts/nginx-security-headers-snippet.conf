# Easy NodeOne — cabeceras de seguridad (opcional en Nginx).
# Incluir solo en server { listen 443 ssl; ... } dentro de location / { ... } o a nivel server.
# Si la app Flask ya envía las mismas (nodeone.services.security_headers), evitá duplicar;
# en ese caso usá solo Nginx y NODEONE_DISABLE_APP_SECURITY_HEADERS=1 en el .env.
#
#   include /ruta/a/scripts/nginx-security-headers-snippet.conf;
#
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(self), usb=()" always;
