<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e3a8a">
  <title>Sin conexión</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; background: #f1f5f9; color: #0f172a;
    }
    .card {
      max-width: 22rem; text-align: center; background: #fff; padding: 2rem 1.5rem;
      border-radius: 12px; box-shadow: 0 8px 24px rgba(15,23,42,.08);
    }
    h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
    p { margin: 0 0 1.25rem; color: #64748b; font-size: .95rem; line-height: 1.5; }
    button {
      appearance: none; border: 0; cursor: pointer; font-size: 1rem; font-weight: 600;
      padding: .65rem 1.25rem; border-radius: 8px; background: #2563eb; color: #fff;
    }
    button:active { opacity: .9; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sin conexión</h1>
    <p>Comprueba tu red e intenta de nuevo. Esta página se muestra cuando no hay internet.</p>
    <button type="button" onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
