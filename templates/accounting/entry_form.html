{% extends "base.html" %}
{% block title %}Nuevo asiento{% endblock %}
{% block content %}
<div class="container py-4">
  <h1 class="h3 mb-3">Nuevo asiento</h1>
  <form method="post" action="{{ url_for('accounting_core.entries_create') }}">
    <div class="row g-2 mb-3">
      <div class="col-md-3">
        <label class="form-label">Diario</label>
        <select class="form-select" name="journal_id" required>
          <option value="">Seleccione…</option>
          {% for j in journals %}
            <option value="{{ j.id }}">{{ j.code }} — {{ j.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Fecha</label>
        <input type="date" class="form-control" name="date" value="{{ (entry.date if entry else none) or '' }}" required />
      </div>
      <div class="col-md-6">
        <label class="form-label">Referencia</label>
        <input class="form-control" name="reference" maxlength="120" />
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-header">Líneas</div>
      <div class="card-body">
        {% for i in range(6) %}
        <div class="row g-2 mb-2">
          <div class="col-md-4">
            <select class="form-select" name="line_account_id">
              <option value="">Cuenta…</option>
              {% for a in accounts %}
                <option value="{{ a.id }}">{{ a.code }} — {{ a.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-2"><input class="form-control" type="number" step="0.01" min="0" name="line_debit" placeholder="Debe" /></div>
          <div class="col-md-2"><input class="form-control" type="number" step="0.01" min="0" name="line_credit" placeholder="Haber" /></div>
          <div class="col-md-4"><input class="form-control" name="line_description" maxlength="255" placeholder="Descripción" /></div>
        </div>
        {% endfor %}
      </div>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary">Guardar borrador</button>
      <a href="{{ url_for('accounting_core.entries_list') }}" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
