{% extends "base.html" %}
{% block title %}Configuración · Impuestos | {{ get_nav_brand_name() }}{% endblock %}
{% block content %}
<div class="container-fluid px-2 px-sm-3 py-2 erp-compact-page" id="taxesAdminPage">
    <div id="taxesPageError" class="alert alert-danger py-2 px-2 mb-2 d-none" role="alert"></div>

    <div class="erp-toolbar d-flex flex-wrap align-items-center mb-2">
        <h1 class="h5 mb-0 text-nowrap me-1" title="Catálogo fiscal para cotizaciones y facturas">
            <i class="fas fa-percent me-1 text-muted" aria-hidden="true"></i>Impuestos
        </h1>
        <div class="form-check mb-0">
            <input class="form-check-input" type="checkbox" id="taxIncludeInactive">
            <label class="form-check-label erp-footnote" for="taxIncludeInactive">Inactivos</label>
        </div>
        {% if saas_module_enabled('sales') %}
        <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('admin_sales_quotations') }}">Cotizaciones</a>
        {% endif %}
    </div>

    <div class="card border mb-2">
        <div class="card-body py-2 px-2">
            <div class="row g-2 align-items-end">
                <div class="col-6 col-md-3">
                    <label class="form-label erp-footnote mb-0" for="taxName">Nombre</label>
                    <input id="taxName" class="form-control form-control-sm" placeholder="ITBMS 7%">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label erp-footnote mb-0" for="taxComputation">Tipo</label>
                    <select id="taxComputation" class="form-select form-select-sm">
                        <option value="percent">Porcentaje</option>
                        <option value="fixed">Fijo</option>
                    </select>
                </div>
                <div class="col-4 col-md-2">
                    <label class="form-label erp-footnote mb-0" for="taxValue">Valor</label>
                    <input id="taxValue" class="form-control form-control-sm" type="number" step="0.01" value="7">
                </div>
                <div class="col-8 col-md-3 d-flex align-items-end gap-2">
                    <div class="form-check mb-0">
                        <input class="form-check-input" type="checkbox" id="taxPriceIncluded">
                        <label class="form-check-label erp-footnote" for="taxPriceIncluded">Incl. precio</label>
                    </div>
                    <button type="button" id="taxCreateBtn" class="btn btn-sm btn-primary">Crear</button>
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive border rounded bg-white">
        <table class="table table-sm table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Nombre</th>
                    <th class="text-nowrap">Tipo</th>
                    <th class="text-end text-nowrap">Valor</th>
                    <th class="text-nowrap">Incluido</th>
                    <th class="text-nowrap">Activo</th>
                    <th class="text-nowrap">Acciones</th>
                </tr>
            </thead>
            <tbody id="taxesAdminTable"></tbody>
        </table>
    </div>
</div>
<script src="{{ url_for('static', filename='js/modules/sales/taxes_admin.js') }}"></script>
{% endblock %}
