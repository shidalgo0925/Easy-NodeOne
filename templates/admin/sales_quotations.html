{% extends "base.html" %}
{% block title %}Cotizaciones | {{ get_nav_brand_name() }}{% endblock %}
{% block content %}
<div class="container-fluid px-2 px-sm-3 py-2 erp-compact-page sales-quotations-page" id="odooQuotationList" data-sales-api-base="{{ url_for('sales.quotations_get') }}">
    <div id="salesError" class="alert alert-danger py-2 px-2 mb-2 d-none" role="alert"></div>

    <div class="erp-toolbar d-flex flex-wrap align-items-center mb-2">
        <h1 class="h5 mb-0 text-nowrap me-1">
            <i class="fas fa-file-alt me-1 text-muted" aria-hidden="true"></i>Cotizaciones
        </h1>
        <button type="button" id="btnNewQuotation" class="btn btn-primary btn-sm">Nuevo</button>
        <button type="button" class="btn btn-outline-secondary btn-sm">Cargar</button>
        <span class="d-none d-md-inline vr align-self-stretch mx-1" aria-hidden="true"></span>
        <span class="badge text-bg-light border text-secondary erp-footnote py-2">Mis cotizaciones</span>
        <input type="search" id="quotationSearch" class="form-control form-control-sm erp-search" placeholder="Buscar número, cliente, email…" aria-label="Buscar cotizaciones">
    </div>

    <div class="table-responsive border rounded bg-white">
        <table class="table table-sm table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th class="text-center align-middle" style="width:2rem"><input type="checkbox" aria-label="Seleccionar todas"></th>
                    <th class="text-start align-middle">Número</th>
                    <th class="text-start align-middle text-nowrap">Fecha</th>
                    <th class="text-start align-middle">Cliente</th>
                    <th class="text-start align-middle">Email</th>
                    <th class="text-start align-middle text-nowrap">Vendedor</th>
                    <th class="text-end align-middle">Total</th>
                    <th class="text-start align-middle">Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyQuotations"></tbody>
            <tfoot>
                <tr>
                    <td colspan="6" class="border-0 py-1"></td>
                    <td class="text-end fw-semibold border-0 py-1" id="qTotalFooter">B/. 0.00</td>
                    <td class="border-0 py-1"></td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>
<script src="{{ url_for('static', filename='js/modules/sales/quotations_list.js') }}?v=13"></script>
{% endblock %}
