{% extends "base.html" %}
{% block title %}Taller — Órdenes | {{ get_nav_brand_name() }}{% endblock %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/workshop.css') }}?v=30">
<div class="container-fluid py-3 workshop-orders-monitor">
    <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
        <h1 class="h4 mb-0">Taller · Monitor</h1>
        <div class="d-flex align-items-center gap-2 ms-auto flex-wrap">
            <label class="small text-muted mb-0">Estado</label>
            <select class="form-select form-select-sm" id="woFilterStatus" style="width:auto;min-width:11rem">
                <option value="">Todos</option>
                <option value="draft">Borrador</option>
                <option value="inspected">Inspeccionado</option>
                <option value="quoted">Cotizado</option>
                <option value="approved">Aprobado</option>
                <option value="in_progress">En proceso</option>
                <option value="qc">Control calidad</option>
                <option value="done">Terminado</option>
                <option value="delivered">Entregado</option>
                <option value="cancelled">Cancelado</option>
            </select>
            <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('admin_workshop_process_config') }}">Config. procesos SLA</a>
            <a class="btn btn-primary btn-sm" href="{{ url_for('admin_workshop_order_new') }}">+ Nueva orden</a>
        </div>
    </div>
    <div id="woListErr" class="alert alert-danger d-none"></div>

    <div id="woKpiStrip" class="row row-cols-2 row-cols-md-3 row-cols-xl-6 g-2 mb-3 d-none"></div>

    <div class="row g-3">
        <div class="col-lg-9 order-2 order-lg-1">
            <div id="woCardGrid" class="row g-2"><div class="col-12 text-muted small py-4">Cargando…</div></div>
        </div>
        <div class="col-lg-3 order-1 order-lg-2">
            <div class="card border-0 shadow-sm sticky-top wo-alerts-panel" style="top:1rem;z-index:1">
                <div class="card-header py-2 small fw-semibold">Alertas SLA</div>
                <div class="card-body p-2 small" id="woAlertsBody">
                    <p class="text-muted mb-0 small">Cargando…</p>
                </div>
                <div class="card-footer py-2 small text-muted border-0" id="woHeatmapHint"></div>
            </div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/modules/workshop/orders_list.js') }}?v=6"></script>
{% endblock %}
