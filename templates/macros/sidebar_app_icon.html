{# Icono app admin: SVG multicolor en static/icons/apps/<name>.svg #}
{% macro sidebar_app_icon(name) %}
<span class="menu-icon menu-icon-app" aria-hidden="true"><img src="{{ url_for('static', filename='icons/apps/' ~ name ~ '.svg') }}?v=1" alt="" width="18" height="18" loading="lazy" decoding="async"></span>
{% endmacro %}
