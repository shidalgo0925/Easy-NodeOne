<div class="checkout-pay-method-block px-3 pb-3{% if checkout_first_method == 'paypal' %} is-selected{% endif %}" data-checkout-method-block data-method-key="paypal">
  <label class="checkout-pay-method-row list-group-item list-group-item-action d-flex align-items-start gap-3 rounded mb-0 py-3 px-3" for="method_paypal">
    <input class="form-check-input flex-shrink-0 mt-1" type="radio" name="payment_method" id="method_paypal" value="paypal"
           {% if checkout_first_method == 'paypal' %}checked{% endif %}>
    <span class="flex-grow-1">
      <span class="d-flex align-items-center gap-2 flex-wrap fw-semibold text-body">
        <i class="fab fa-paypal text-primary" aria-hidden="true"></i>
        {{ payment_methods.paypal }}
      </span>
      <span class="d-block small text-muted mt-1 mb-0">Serás redirigido a PayPal para autorizar el total.</span>
    </span>
  </label>
  <div class="checkout-pay-method-instructions border rounded p-3 mt-1 small bg-white text-body" data-method-instructions aria-live="polite">
    <p class="mb-2 fw-semibold text-primary mb-1">PayPal</p>
    {% if method_by_key.paypal and method_by_key.paypal.instructions_html %}
    <div class="mb-2">{{ method_by_key.paypal.instructions_html | safe }}</div>
    {% endif %}
    <p class="mb-0">Iniciá sesión en PayPal y confirmá el monto exacto del pedido.</p>
  </div>
</div>
