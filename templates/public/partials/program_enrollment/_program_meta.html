<ul class="pe-meta-list">
  <li><i class="fas fa-laptop" aria-hidden="true"></i><span>{{ program.modality or '100% online' }}</span></li>
  {% if program.duration_text or program.hours %}
  <li><i class="fas fa-clock" aria-hidden="true"></i><span>{{ program.duration_text or program.hours }}</span></li>
  {% endif %}
  <li><i class="fas fa-globe-americas" aria-hidden="true"></i><span>{{ program.language or 'Español' }}</span></li>
  <li><i class="fas fa-shield-alt" aria-hidden="true"></i><span>Pago seguro en checkout</span></li>
</ul>
