{% extends "base.html" %}

{% block title %}Seleccionar empresa — {{ get_nav_brand_name() }}{% endblock %}

{% block page_content %}
<style>
    .org-picker-wrap { min-height: calc(100vh - 120px); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .org-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
        gap: 1.25rem;
        max-width: 640px;
        width: 100%;
    }
    .org-card {
        background: var(--bs-body-bg, #fff);
        border-radius: 12px;
        padding: 1.25rem 1rem;
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        border: 1px solid var(--color-border, #e2e8f0);
    }
    .org-card:hover, .org-card:focus-visible {
        transform: translateY(-4px);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.12);
    }
    .org-card:focus-visible { outline: 2px solid var(--color-primary, #0d6efd); outline-offset: 2px; }
    .org-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        margin: 0 auto 0.75rem;
        display: block;
    }
    .org-name { font-weight: 600; font-size: 0.95rem; line-height: 1.3; }
</style>
<div class="container org-picker-wrap">
    <h1 class="h4 mb-2 text-center">Selecciona tu empresa</h1>
    <p class="text-muted small text-center mb-4">Elegí la compañía con la que vas a trabajar en esta sesión.</p>
    <div class="org-grid" role="list">
        {% for o in picker_organizations %}
        <button type="button" class="org-card text-decoration-none text-body w-100" role="listitem"
                onclick="selectOrgPicker({{ o.id }})" aria-label="Entrar como {{ o.name }}">
            <img src="{{ o.logo }}" alt="" class="org-logo" width="64" height="64" loading="lazy">
            <div class="org-name">{{ o.name }}</div>
        </button>
        {% endfor %}
    </div>
    <p id="orgPickerErr" class="text-danger small mt-3 d-none" role="alert"></p>
</div>
<script>
(function () {
    window.selectOrgPicker = function (orgId) {
        var err = document.getElementById('orgPickerErr');
        if (err) { err.classList.add('d-none'); err.textContent = ''; }
        fetch('{{ url_for("set_organization") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ organization_id: parseInt(orgId, 10) }),
            credentials: 'same-origin'
        }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
          .then(function (x) {
            if (x.j && x.j.success) {
                var next = {{ (next_url or '')|tojson }};
                window.location.href = (next && String(next).trim()) ? next : '{{ url_for("dashboard") }}';
                return;
            }
            var msg = (x.j && x.j.error) ? x.j.error : 'No se pudo cambiar de empresa.';
            if (err) { err.textContent = msg; err.classList.remove('d-none'); }
            else { alert(msg); }
          })
          .catch(function () {
            if (err) { err.textContent = 'Error de red. Intenta de nuevo.'; err.classList.remove('d-none'); }
            else { alert('Error de red.'); }
          });
    };
})();
</script>
{% endblock %}
